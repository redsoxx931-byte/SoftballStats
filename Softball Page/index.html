<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Softball Batting Stats</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Slowpitch Softball Stats</h1>

    <table id="statsTable">
      <thead>
  <tr>
    <th data-stat="name">Player</th>
    <th data-stat="ab">AB</th>
    <th data-stat="h">H</th>
    <th data-stat="doubles">2B</th>
    <th data-stat="triples">3B</th>
    <th data-stat="hr">HR</th>
    <th data-stat="avg">AVG</th>
    <th data-stat="slg">SLG</th>
    <th data-stat="ops">OPS</th>
  </tr>
</thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
